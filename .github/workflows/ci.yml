name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install locked project and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install -e . --no-deps

      - name: Generate deterministic training and scoring batches
        run: python data/generate_churn_data.py

      - name: Run tests with coverage and Spark contract tests
        run: python -m pytest

      - name: Run local train/validation/test smoke test
        run: python src/train_local.py

      - name: Compile Python and Databricks notebook sources
        run: python -m compileall -q data src tests notebooks

      - name: Lint Python
        run: ruff check .

      - name: Audit Python dependencies
        run: pip-audit -r requirements-dev.lock

  bundle:
    name: Validate Databricks bundle
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@dd60b7b133203edca3e8f08b1e053c43a979296e

      - name: Verify bundle schema command
        run: databricks bundle schema > /dev/null

      - name: Validate against a configured workspace
        if: ${{ env.DATABRICKS_HOST != '' && env.DATABRICKS_TOKEN != '' }}
        run: databricks bundle validate -t dev --var="catalog=churn_mlops" --var="model_name=churn_mlops.churn_dev.churn_classifier" --var="notification_email=ci@example.com"

  infrastructure:
    name: Validate Bicep, Terraform, and shell
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Azure CLI and compile Bicep
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        with:
          azcliversion: 2.71.0
          inlineScript: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.9.8

      - name: Check Terraform formatting
        run: terraform -chdir=infra/databricks fmt -check

      - name: Check shell syntax
        run: bash -n infra/deploy.sh infra/teardown.sh
