name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and development tools
        run: python -m pip install -e ".[dev]"

      - name: Generate deterministic test data
        run: python data/generate_churn_data.py

      - name: Run tests
        run: python -m pytest

      - name: Run local training smoke test
        run: python src/train_local.py

      - name: Compile Python and Databricks notebook sources
        run: python -m compileall -q data src tests notebooks

      - name: Lint Python
        run: ruff check .

  infrastructure:
    name: Validate Bicep and shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Azure CLI
        uses: azure/cli@v2
        with:
          azcliversion: 2.71.0
          inlineScript: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Check shell syntax
        run: bash -n infra/deploy.sh infra/teardown.sh
