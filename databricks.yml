bundle:
  name: databricks-lakehouse-mlops

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog provisioned by infra/databricks Terraform
  schema:
    description: Environment-specific Unity Catalog schema
  model_name:
    description: Fully qualified Unity Catalog model name (catalog.schema.model)
  notification_email:
    description: Address that receives job failure and duration warnings
  training_input_path:
    description: Path inside the raw external volume for the immutable training batch
    default: training/telco_churn_train.csv
  scoring_input_path:
    description: Path or glob inside the raw external volume for the current scoring batch
    default: scoring/telco_churn_scoring.csv
  decision_threshold:
    description: Probability threshold used to create the operational class prediction
    default: "0.50"
  inference_alias:
    description: Registry alias used by scheduled scoring
    default: staging
  spark_version:
    description: Azure Databricks Runtime ML version for job clusters
    default: 14.3.x-cpu-ml-scala2.12
  node_type_id:
    description: Azure VM type used by the single-node job cluster
    default: Standard_D4ds_v5

targets:
  dev:
    default: true
    mode: development
    resources:
      jobs:
        churn_retraining:
          schedule:
            pause_status: PAUSED
        churn_batch_monitoring:
          schedule:
            pause_status: PAUSED
    variables:
      schema: churn_dev
      inference_alias: staging

  prod:
    mode: production
    resources:
      jobs:
        churn_retraining:
          schedule:
            pause_status: UNPAUSED
        churn_batch_monitoring:
          schedule:
            pause_status: UNPAUSED
    variables:
      schema: churn_prod
      inference_alias: production
