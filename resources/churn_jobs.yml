resources:
  jobs:
    churn_retraining:
      name: churn-retraining-${bundle.target}
      description: Build a versioned training batch, compare candidates, and gate staging.
      max_concurrent_runs: 1
      timeout_seconds: 7200
      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN *"
        timezone_id: Australia/Sydney
        pause_status: PAUSED
      email_notifications:
        on_failure:
          - ${var.notification_email}
        on_duration_warning_threshold_exceeded:
          - ${var.notification_email}
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 5400
      tags:
        project: churn-lakehouse
        workload: retraining
        environment: ${bundle.target}
        cost-centre: portfolio-lab
      job_clusters:
        - job_cluster_key: churn_ml
          new_cluster: &single_node_ml_cluster
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            driver_node_type_id: ${var.node_type_id}
            num_workers: 0
            data_security_mode: DATA_SECURITY_MODE_DEDICATED
            runtime_engine: STANDARD
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*, 4]
            custom_tags:
              ResourceClass: SingleNode
              Project: churn-lakehouse
              Environment: ${bundle.target}
      tasks:
        - task_key: bronze_ingest
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingest.py
            base_parameters: &training_batch_parameters
              catalog: ${var.catalog}
              schema: ${var.schema}
              environment: ${bundle.target}
              input_path: ${var.training_input_path}
              input_role: training
              batch_id: "{{job.run_id}}"
              job_run_id: "{{job.run_id}}"
        - task_key: silver_clean
          depends_on:
            - task_key: bronze_ingest
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          max_retries: 1
          notebook_task:
            notebook_path: ../notebooks/02_silver_clean.py
            base_parameters: &training_transform_parameters
              catalog: ${var.catalog}
              schema: ${var.schema}
              environment: ${bundle.target}
              batch_id: "{{job.run_id}}"
        - task_key: gold_features
          depends_on:
            - task_key: silver_clean
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          max_retries: 1
          notebook_task:
            notebook_path: ../notebooks/03_gold_features.py
            base_parameters: *training_transform_parameters
        - task_key: train_and_register
          depends_on:
            - task_key: gold_features
          job_cluster_key: churn_ml
          timeout_seconds: 3600
          notebook_task:
            notebook_path: ../notebooks/04_train_mlflow.py
            base_parameters:
              <<: *training_transform_parameters
              job_run_id: "{{job.run_id}}"
              model_name: ${var.model_name}
              min_roc_auc: "0.75"
              min_average_precision: "0.55"
              min_f1: "0.55"
              max_auc_regression: "0.01"

    churn_batch_monitoring:
      name: churn-batch-monitoring-${bundle.target}
      description: Build and score a new input batch, then run labelled performance and drift gates.
      max_concurrent_runs: 1
      timeout_seconds: 5400
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: Australia/Sydney
        pause_status: PAUSED
      email_notifications:
        on_failure:
          - ${var.notification_email}
        on_duration_warning_threshold_exceeded:
          - ${var.notification_email}
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 3600
      tags:
        project: churn-lakehouse
        workload: monitoring
        environment: ${bundle.target}
        cost-centre: portfolio-lab
      job_clusters:
        - job_cluster_key: churn_ml
          new_cluster: *single_node_ml_cluster
      tasks:
        - task_key: bronze_ingest
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              environment: ${bundle.target}
              input_path: ${var.scoring_input_path}
              input_role: scoring
              batch_id: "{{job.run_id}}"
              job_run_id: "{{job.run_id}}"
        - task_key: silver_clean
          depends_on:
            - task_key: bronze_ingest
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          max_retries: 1
          notebook_task:
            notebook_path: ../notebooks/02_silver_clean.py
            base_parameters: &scoring_transform_parameters
              catalog: ${var.catalog}
              schema: ${var.schema}
              environment: ${bundle.target}
              batch_id: "{{job.run_id}}"
        - task_key: gold_features
          depends_on:
            - task_key: silver_clean
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          max_retries: 1
          notebook_task:
            notebook_path: ../notebooks/03_gold_features.py
            base_parameters: *scoring_transform_parameters
        - task_key: batch_inference
          depends_on:
            - task_key: gold_features
          job_cluster_key: churn_ml
          timeout_seconds: 1800
          max_retries: 1
          notebook_task:
            notebook_path: ../notebooks/05_batch_inference.py
            base_parameters: &inference_parameters
              <<: *scoring_transform_parameters
              job_run_id: "{{job.run_id}}"
              model_name: ${var.model_name}
              model_alias: ${var.inference_alias}
              decision_threshold: ${var.decision_threshold}
        - task_key: monitor_model
          depends_on:
            - task_key: batch_inference
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          notebook_task:
            notebook_path: ../notebooks/06_monitoring.py
            base_parameters:
              <<: *scoring_transform_parameters
              min_accuracy: "0.70"
              min_f1: "0.55"
              min_roc_auc: "0.70"
              min_average_precision: "0.50"
              max_feature_shift: "1.0"

    churn_model_promotion:
      name: churn-model-promotion-${bundle.target}
      description: Unscheduled approval gate that moves a passing staging version to production.
      max_concurrent_runs: 1
      parameters:
        - name: candidate_version
          default: ""
        - name: approved_by
          default: ""
        - name: confirm
          default: ""
      tags:
        project: churn-lakehouse
        workload: promotion
        environment: ${bundle.target}
      job_clusters:
        - job_cluster_key: churn_ml
          new_cluster: *single_node_ml_cluster
      tasks:
        - task_key: promote_model
          job_cluster_key: churn_ml
          timeout_seconds: 1200
          notebook_task:
            notebook_path: ../notebooks/07_promote_model.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              environment: ${bundle.target}
              model_name: ${var.model_name}
              candidate_version: "{{job.parameters.candidate_version}}"
              approved_by: "{{job.parameters.approved_by}}"
              confirm: "{{job.parameters.confirm}}"
